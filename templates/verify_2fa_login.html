{% extends "base.html" %}

{% block title %}Подтверждение 2FA{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark text-center">
                    <h4 class="mb-0">🔐 Двухфакторная аутентификация</h4>
                </div>
                <div class="card-body text-center">
                    
                    <div class="mb-4">
                        <i class="bi bi-shield-lock display-1 text-warning"></i>
                        <p class="mt-3">
                            Введите код из приложения аутентификатора для<br>
                            <strong>{{ email }}</strong>
                        </p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-4">
                            <input type="text" 
                                   class="form-control form-control-lg text-center" 
                                   id="code" 
                                   name="code" 
                                   placeholder="000000"
                                   maxlength="6"
                                   required
                                   autofocus
                                   style="font-size: 32px; letter-spacing: 10px; font-weight: bold;">
                        </div>
                        
                        <button type="submit" class="btn btn-warning btn-lg w-100">
                            🔓 Подтвердить и войти
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-muted small">
                        <i class="bi bi-info-circle"></i>
                        Код обновляется каждые 30 секунд
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Автоматически переключаться на следующее поле
    document.getElementById('code').addEventListener('input', function(e) {
        if (e.target.value.length === 6) {
            e.target.form.submit();
        }
    });
</script>
{% endblock %}
